# External Secrets Operator Configuration
# Sync secrets dari Vault ke Kubernetes Secrets

---
# ServiceAccount untuk aplikasi
apiVersion: v1
kind: ServiceAccount
metadata:
  name: myapp
  namespace: default

---
# SecretStore: koneksi ke Vault
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: default
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        # Kubernetes auth method
        kubernetes:
          mountPath: "kubernetes"
          role: "myapp"
          serviceAccountRef:
            name: "myapp"

---
# ExternalSecret: definisi secret apa yang di-sync
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: myapp-secrets
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  
  target:
    name: myapp-secrets  # nama Kubernetes Secret yang akan dibuat
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Template bisa transform data dari Vault
        config.yaml: |
          database:
            host: postgres.default.svc.cluster.local
            port: 5432
            username: {{ .db_username }}
            password: {{ .db_password }}
          api:
            key: {{ .api_key }}
  
  data:
    # Map field dari Vault ke ExternalSecret
    - secretKey: db_username
      remoteRef:
        key: myapp/config
        property: db_username
    
    - secretKey: db_password
      remoteRef:
        key: myapp/config
        property: db_password
    
    - secretKey: api_key
      remoteRef:
        key: myapp/config
        property: api_key

---
# ClusterSecretStore: shared across namespaces
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend-cluster
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets-operator"
          serviceAccountRef:
            name: "external-secrets-sa"
            namespace: "external-secrets-system"

---
# Example deployment yang pakai synced secrets
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      serviceAccountName: myapp
      containers:
      - name: app
        image: myapp:latest
        ports:
        - containerPort: 8080
        
        # Mount secrets sebagai volume (recommended)
        volumeMounts:
        - name: secrets
          mountPath: /etc/secrets
          readOnly: true
        
        # Atau inject sebagai env vars (less secure)
        # env:
        # - name: DB_PASSWORD
        #   valueFrom:
        #     secretKeyRef:
        #       name: myapp-secrets
        #       key: db_password
      
      volumes:
      - name: secrets
        secret:
          secretName: myapp-secrets
