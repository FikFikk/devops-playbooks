## GitHub Actions: CI/CD Pipeline dengan Security Scanning
## File ini ditaruh di: .github/workflows/security-scan.yaml
## Jalankan scan setiap PR dan push ke main

name: Security Scan Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  ## Job 1: Scan source code untuk secrets
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history untuk scan

      - name: Scan untuk secrets dengan Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ## Job 2: Dependency vulnerability scan
  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan dependencies dengan Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'dependency-scan.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

      - name: Upload hasil ke GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'dependency-scan.sarif'

  ## Job 3: Scan Kubernetes manifests
  k8s-manifest-scan:
    name: K8s Manifest Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.50.0

      - name: Scan K8s manifests
        run: |
          trivy config \
            --format table \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            ./k8s-manifests/ || true

      - name: Install Kubescape
        run: |
          curl -s https://raw.githubusercontent.com/kubescape/kubescape/master/install.sh | /bin/bash

      - name: Kubescape scan NSA framework
        run: |
          kubescape scan framework nsa \
            --format junit \
            --output kubescape-results.xml \
            ./k8s-manifests/

  ## Job 4: Build dan scan Docker image
  image-build-scan:
    name: Build & Scan Container Image
    runs-on: ubuntu-latest
    needs: [secret-scan, dependency-scan]
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login ke Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (belum push, hanya untuk scan)
        uses: docker/build-push-action@v5
        id: build
        with:
          context: .
          file: ./scanning/secure.Dockerfile
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Load image untuk scanning
        run: docker load < /tmp/image.tar

      - name: Scan image dengan Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'image-scan.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true

      - name: Upload hasil scan image
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'image-scan.sarif'

      ## Jika scan berhasil (tidak ada vuln HIGH/CRITICAL), push dan sign image
      - name: Push image ke registry
        if: github.ref == 'refs/heads/main' && success()
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./scanning/secure.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      ## Sign image dengan Cosign (supply chain security)
      - name: Install Cosign
        if: github.ref == 'refs/heads/main' && success()
        uses: sigstore/cosign-installer@v3

      - name: Sign image dengan Cosign (keyless)
        if: github.ref == 'refs/heads/main' && success()
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
        env:
          COSIGN_EXPERIMENTAL: "true"

      ## Generate SBOM untuk compliance
      - name: Generate SBOM dengan Trivy
        if: github.ref == 'refs/heads/main' && success()
        run: |
          trivy image \
            --format cyclonedx \
            --output sbom.json \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Attach SBOM ke image
        if: github.ref == 'refs/heads/main' && success()
        run: |
          cosign attach sbom \
            --sbom sbom.json \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
