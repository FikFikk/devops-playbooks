name: Preview Environment

on:
  pull_request:
    types: [opened, synchronize, labeled, reopened, closed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy-preview:
    if: |
      github.event.action != 'closed' &&
      contains(github.event.pull_request.labels.*.name, 'preview')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build and Push Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Wait for Deployment
      run: |
        echo "Waiting for Argo CD to sync environment..."
        for i in {1..30}; do
          sleep 10
          echo "Checking deployment status ($i/30)..."
          
          HEALTH=$(kubectl get namespace pr-${{ github.event.pull_request.number }} -o jsonpath='{.status.phase}' 2>/dev/null || echo "NotFound")
          if [ "$HEALTH" = "Active" ]; then
            echo "✅ Namespace ready!"
            sleep 30  # Wait for pods to start
            break
          fi
        done
    
    - name: Comment Preview URL
      uses: actions/github-script@v7
      with:
        script: |
          const prNumber = context.issue.number;
          const previewUrl = `https://pr-${prNumber}.preview.yourapp.com`;
          const sha = context.payload.pull_request.head.sha.substring(0, 7);
          
          const body = `## 🚀 Preview Environment Ready!
          
          **URL**: ${previewUrl}
          **Image**: \`pr-${prNumber}\`
          **Commit**: \`${sha}\`
          **Credentials**: \`preview\` / \`preview123\`
          
          Environment akan otomatis dihapus 24 jam setelah PR closed atau merged.
          
          ---
          *Deployment via Argo CD ApplicationSet*`;
          
          github.rest.issues.createComment({
            issue_number: prNumber,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          });

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    
    steps:
    - name: Delete Preview Environment
      run: |
        echo "Triggering cleanup for PR #${{ github.event.pull_request.number }}"
        # Argo CD ApplicationSet akan auto-cleanup saat PR closed
        # Atau trigger manual cleanup:
        kubectl delete namespace pr-${{ github.event.pull_request.number }} --ignore-not-found=true || true
    
    - name: Comment Cleanup Status
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '🧹 Preview environment telah dihapus.'
          });
