apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: preview-ingress
  annotations:
    external-dns.alpha.kubernetes.io/hostname: pr-{{ .Values.pr.number }}.preview.yourapp.com
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: preview-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "Preview Environment"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - pr-{{ .Values.pr.number }}.preview.yourapp.com
    secretName: pr-{{ .Values.pr.number }}-tls
  rules:
  - host: pr-{{ .Values.pr.number }}.preview.yourapp.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: app
            port:
              number: 80
