# =============================================================================
# pgBackRest Configuration — Enterprise Backup Solution
# File: /etc/pgbackrest/pgbackrest.conf
# =============================================================================

[global]
# =============================================================================
# Repository Configuration
# =============================================================================

# Option 1: Backup ke S3 (DIREKOMENDASIKAN untuk production)
repo1-type              = s3
repo1-path              = /db-backups/production
repo1-s3-bucket         = your-company-db-backups
repo1-s3-endpoint       = s3.ap-southeast-1.amazonaws.com
repo1-s3-region         = ap-southeast-1
repo1-s3-key            = AKIAIOSFODNN7EXAMPLE
repo1-s3-key-secret     = wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
repo1-s3-uri-style      = path

# Option 2: Backup ke NFS mount (uncomment jika menggunakan NFS)
# repo1-type              = posix
# repo1-path              = /mnt/backup/pgbackrest

# =============================================================================
# ENKRIPSI — WAJIB di production!
# =============================================================================
repo1-cipher-type       = aes-256-cbc
# Simpan passphrase ini di HashiCorp Vault atau AWS Secrets Manager!
repo1-cipher-pass       = GANTI_DENGAN_PASSPHRASE_SANGAT_KUAT_MINIMAL_32_KARAKTER

# =============================================================================
# Retention Policy
# =============================================================================
# Simpan 4 full backup terakhir (sekitar 1 bulan jika full tiap minggu)
repo1-retention-full    = 4
# Simpan diff backup selama masa full backup aktif
repo1-retention-diff    = 14
# WAL archive: hapus setelah semua backup yang membutuhkannya kadaluarsa
repo1-retention-archive = 4
repo1-retention-archive-type = full

# =============================================================================
# Performa Backup
# =============================================================================
# Kompresi
compress-type           = lz4      # lz4 = cepat, zstd = lebih hemat space
compress-level          = 3        # 1-9, higher = lebih hemat tapi lebih lambat

# Paralelisme
process-max             = 4        # Sesuaikan dengan jumlah CPU
# Untuk restore yang cepat, naikkan lebih tinggi
# restore-process-max   = 8

# I/O throttling — hindari membebani disk production
# backup-standby        = y        # Backup dari replica, bukan primary!
spool-path              = /var/spool/pgbackrest
archive-async           = y        # Async WAL archiving (performa lebih baik)
archive-push-queue-max  = 4GB      # Max queue archive sebelum error

# =============================================================================
# Logging
# =============================================================================
log-level-console       = info
log-level-file          = detail
log-path                = /var/log/pgbackrest
log-timestamp           = y

# =============================================================================
# Stanza: production
# Satu stanza per PostgreSQL cluster
# =============================================================================
[production]
pg1-path                = /var/lib/postgresql/16/main
pg1-port                = 5432
pg1-user                = postgres
pg1-socket-path         = /var/run/postgresql

# Jika backup dari standby (direkomendasikan untuk mengurangi beban primary):
# pg1-host               = 10.0.1.1           # Primary host
# pg1-host-user          = postgres
# pg2-path               = /var/lib/postgresql/16/main
# pg2-port               = 5432
# pg2-host               = 10.0.1.2           # Replica untuk backup
# pg2-host-user          = postgres

# =============================================================================
# Perintah pgBackRest Penting:
# =============================================================================
#
# SETUP (jalankan sekali):
#   pgbackrest --stanza=production stanza-create
#   pgbackrest --stanza=production check
#
# BACKUP:
#   pgbackrest --stanza=production backup --type=full
#   pgbackrest --stanza=production backup --type=diff
#   pgbackrest --stanza=production backup --type=incr
#
# LIST BACKUP:
#   pgbackrest --stanza=production info
#   pgbackrest --stanza=production info --output=json
#
# RESTORE (hati-hati! ini menimpa data!):
#   # Restore full
#   pgbackrest --stanza=production restore
#
#   # Restore ke titik waktu tertentu (PITR)
#   pgbackrest --stanza=production restore \
#     --delta \
#     --type=time \
#     --target="2024-06-15 14:30:00+07" \
#     --target-action=promote
#
#   # Restore ke label tertentu
#   pgbackrest --stanza=production restore \
#     --set=20240615-010000F \
#     --delta
#
# EXPIRE (hapus backup lama):
#   pgbackrest --stanza=production expire
#
# VERIFY (cek integritas backup):
#   pgbackrest --stanza=production verify
# =============================================================================
