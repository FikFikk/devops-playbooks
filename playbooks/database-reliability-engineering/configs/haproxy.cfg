# =============================================================================
# HAProxy Configuration untuk PostgreSQL Load Balancing
# File: /etc/haproxy/haproxy.cfg
# =============================================================================

global
    maxconn     100000
    log         127.0.0.1:514 local0
    log         127.0.0.1:514 local1 notice
    chroot      /var/lib/haproxy
    stats       socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats       timeout 30s
    user        haproxy
    group       haproxy
    daemon

    # SSL cipher suites modern
    ssl-default-bind-ciphers ECDH+AESGCM:DH+AESGCM:ECDH+AES256:DH+AES256:ECDH+AES128:DH+AES:RSA+AESGCM:RSA+AES:!aNULL:!MD5:!DSS
    ssl-default-bind-options no-sslv3

defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    retries 3
    timeout connect  5s
    timeout client   30s
    timeout server   30s
    timeout check    5s

# =============================================================================
# HAProxy Stats Dashboard
# Akses di: http://haproxy-server:7000/
# =============================================================================
listen stats
    bind *:7000
    mode  http
    stats enable
    stats uri     /
    stats realm   HAProxy Statistics
    stats auth    admin:GANTI_DENGAN_PASSWORD_STATS
    stats refresh 10s
    stats show-node
    stats show-legends
    stats show-desc "PostgreSQL HA Cluster"

# =============================================================================
# Frontend Postgres Primary (Read-Write)
# Aplikasi yang perlu write HARUS konek ke port 5000
# =============================================================================
listen postgres_primary
    bind    *:5000
    mode    tcp
    option  httpchk GET /primary
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions

    # Patroni REST API menyediakan endpoint health check
    server  db-primary-01 10.0.1.1:5432 maxconn 500 check port 8008
    server  db-replica-01 10.0.1.2:5432 maxconn 500 check port 8008 backup
    server  db-replica-02 10.0.1.3:5432 maxconn 500 check port 8008 backup

# =============================================================================
# Frontend Postgres Replica (Read-Only)
# Query analytics/reporting HARUS konek ke port 5001
# =============================================================================
listen postgres_replicas
    bind    *:5001
    mode    tcp
    balance roundrobin
    option  httpchk GET /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions

    server  db-replica-01 10.0.1.2:5432 maxconn 500 check port 8008
    server  db-replica-02 10.0.1.3:5432 maxconn 500 check port 8008
    # Fallback ke primary jika semua replica down
    server  db-primary-01 10.0.1.1:5432 maxconn 100 check port 8008 backup

# =============================================================================
# Frontend Patroni REST API (untuk management tools)
# =============================================================================
listen patroni_api
    bind    *:8009
    mode    http
    balance roundrobin

    server  db-primary-01 10.0.1.1:8008 check inter 5s
    server  db-replica-01 10.0.1.2:8008 check inter 5s
    server  db-replica-02 10.0.1.3:8008 check inter 5s

# =============================================================================
# Cara memverifikasi konfigurasi:
# haproxy -c -f /etc/haproxy/haproxy.cfg
#
# Reload HAProxy tanpa downtime:
# systemctl reload haproxy
#
# Cek status via socat:
# echo "show info" | socat stdio /run/haproxy/admin.sock
# echo "show stat" | socat stdio /run/haproxy/admin.sock | column -t -s,
# =============================================================================
