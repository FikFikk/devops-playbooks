# =============================================================================
# Konfigurasi Patroni untuk PostgreSQL HA
# File: /etc/patroni/patroni.yml (di node db-primary-01)
# =============================================================================

scope: production-db                    # Nama cluster — sama di semua node
namespace: /patroni/                    # Prefix key di etcd
name: db-primary-01                     # Nama unik untuk node ini

# =============================================================================
# DCS (Distributed Configuration Store) — etcd
# =============================================================================
etcd3:
  hosts:
    - 10.0.1.1:2379
    - 10.0.1.2:2379
    - 10.0.1.3:2379
  protocol: http
  # ttl: 30             # Waktu sebelum lock kadaluarsa (detik)
  # retry_timeout: 10   # Timeout retry ke etcd

# =============================================================================
# REST API Patroni
# =============================================================================
restapi:
  listen: 0.0.0.0:8008
  connect_address: 10.0.1.1:8008
  # Aktifkan autentikasi API di production
  authentication:
    username: patroni
    password: "GANTI_DENGAN_PASSWORD_KUAT"
  # HTTPS untuk keamanan (opsional tapi sangat direkomendasikan)
  # certfile: /etc/patroni/certs/server.crt
  # keyfile: /etc/patroni/certs/server.key

# =============================================================================
# Bootstrap — hanya dieksekusi saat cluster pertama kali dibuat
# =============================================================================
bootstrap:
  dcs:
    ttl: 30
    loop_wait: 10
    retry_timeout: 10
    maximum_lag_on_failover: 1048576    # 1 MB — replica tidak dipilih jika lag > ini
    primary_start_timeout: 300
    synchronous_mode: false             # Set true untuk zero data loss (lebih lambat)
    synchronous_mode_strict: false

    postgresql:
      use_pg_rewind: true
      use_slots: true                   # Gunakan replication slots
      parameters:
        # Replication
        wal_level: replica
        hot_standby: "on"
        max_wal_senders: 10
        max_replication_slots: 10
        wal_log_hints: "on"             # Diperlukan untuk pg_rewind

        # Performance (sesuaikan dengan hardware!)
        shared_buffers: "8GB"
        effective_cache_size: "24GB"
        work_mem: "64MB"
        maintenance_work_mem: "2GB"
        wal_buffers: "64MB"
        checkpoint_completion_target: 0.9
        checkpoint_timeout: "15min"
        max_wal_size: "4GB"
        min_wal_size: "1GB"
        random_page_cost: 1.1            # Untuk SSD NVMe
        effective_io_concurrency: 200    # Untuk SSD NVMe

        # Connections
        max_connections: 200
        superuser_reserved_connections: 5

        # Logging
        log_destination: "csvlog"
        logging_collector: "on"
        log_directory: "log"
        log_filename: "postgresql-%Y-%m-%d_%H%M%S.log"
        log_rotation_size: "100MB"
        log_min_duration_statement: 1000   # Log query lebih dari 1 detik
        log_checkpoints: "on"
        log_connections: "on"
        log_disconnections: "on"
        log_lock_waits: "on"
        log_temp_files: 0
        log_autovacuum_min_duration: 0
        deadlock_timeout: "1s"
        log_line_prefix: "%m [%p] %q%u@%d "

        # Autovacuum — sangat penting untuk performa!
        autovacuum: "on"
        autovacuum_max_workers: 5
        autovacuum_vacuum_scale_factor: 0.05
        autovacuum_analyze_scale_factor: 0.02
        autovacuum_vacuum_cost_limit: 400

        # pgBackRest WAL archiving
        archive_mode: "on"
        archive_command: "pgbackrest --stanza=production archive-push %p"
        archive_timeout: "300s"

  # Script inisialisasi database
  initdb:
    - encoding: UTF8
    - data-checksums          # Deteksi korupsi data
    - locale: "en_US.UTF-8"

  # pg_hba.conf — siapa yang boleh konek
  pg_hba:
    # Loopback untuk superuser
    - host  replication  replicator  127.0.0.1/32  scram-sha-256
    - host  all          postgres    127.0.0.1/32  trust
    # Replikasi antar node (gunakan SSL di production!)
    - hostssl  replication  replicator  10.0.1.0/24  scram-sha-256
    # Koneksi aplikasi
    - hostssl  all          all         10.0.0.0/8    scram-sha-256
    # Patroni REST API health check dari HAProxy
    - host  all  all  0.0.0.0/0  reject

  # Setup awal users
  users:
    admin:
      password: "GANTI_DENGAN_PASSWORD_ADMIN_KUAT"
      options:
        - createrole
        - createdb
    replicator:
      password: "GANTI_DENGAN_PASSWORD_REPLICATOR"
      options:
        - replication

# =============================================================================
# PostgreSQL Process Configuration
# =============================================================================
postgresql:
  listen: 0.0.0.0:5432
  connect_address: 10.0.1.1:5432           # IP node ini
  data_dir: /var/lib/postgresql/16/main
  bin_dir: /usr/lib/postgresql/16/bin
  pgpass: /tmp/pgpass                      # Password file untuk koneksi internal

  # Autentikasi untuk Patroni sendiri
  authentication:
    replication:
      username: replicator
      password: "GANTI_DENGAN_PASSWORD_REPLICATOR"
    superuser:
      username: postgres
      password: "GANTI_DENGAN_PASSWORD_POSTGRES"

  # Paramater tambahan
  parameters:
    unix_socket_directories: '/var/run/postgresql'
    ssl: "on"
    ssl_cert_file: "/etc/ssl/certs/server.crt"
    ssl_key_file: "/etc/ssl/private/server.key"

  # Lifecycle hooks
  callbacks:
    on_start: /etc/patroni/callbacks/on_start.sh
    on_stop: /etc/patroni/callbacks/on_stop.sh
    on_role_change: /etc/patroni/callbacks/on_role_change.sh  # Notifikasi saat failover

# =============================================================================
# Watchdog — jika ada split-brain, watchdog akan restart server
# =============================================================================
watchdog:
  mode: required  # automatic | required | off
  device: /dev/watchdog
  safety_margin: 5

# =============================================================================
# Tags untuk node ini
# =============================================================================
tags:
  nofailover: false      # Set true jika node ini JANGAN jadi primary
  noloadbalance: false   # Set true jika node ini tidak menerima baca
  clonefrom: false       # Set true jika node ini dipakai sebagai sumber clone
  nosync: false          # Set true untuk exclude dari sync replication

# =============================================================================
# CATATAN UNTUK REPLICA NODES:
