# =============================================================================
# PgBouncer Configuration — Connection Pooling untuk PostgreSQL
# File: /etc/pgbouncer/pgbouncer.ini
# =============================================================================

[databases]
# Format: db_alias = host=... port=... dbname=... user=...
#
# Koneksi ke primary (via HAProxy)
* = host=haproxy-vip port=5000 pool_size=20
#
# Alias khusus per database
myapp       = host=haproxy-vip port=5000 dbname=myapp pool_size=50
myapp_read  = host=haproxy-vip port=5001 dbname=myapp pool_size=30 pool_mode=session

[pgbouncer]
# =============================================================================
# Network Configuration
# =============================================================================
listen_addr     = 0.0.0.0
listen_port     = 6432
unix_socket_dir = /var/run/postgresql

# =============================================================================
# Pool Mode
# session   : satu koneksi PG selama sesi klien aktif (paling kompatibel)
# transaction: satu koneksi PG hanya selama transaksi (DIREKOMENDASIKAN)
# statement : satu koneksi PG per statement (sangat efisien, tapi terbatas)
# =============================================================================
pool_mode = transaction

# =============================================================================
# Connection Limits
# =============================================================================
max_client_conn     = 10000      # Max koneksi dari aplikasi ke PgBouncer
default_pool_size   = 25         # Koneksi real ke PostgreSQL per user/db
min_pool_size       = 5          # Minimal koneksi yang selalu open
reserve_pool_size   = 5          # Koneksi cadangan darurat
reserve_pool_timeout = 5         # Detik sebelum pakai reserve pool

# Timeout
server_idle_timeout  = 600       # Detik idle koneksi ke PG sebelum ditutup
client_idle_timeout  = 0         # 0 = tidak ada timeout klien (atur di aplikasi!)
server_lifetime      = 3600      # Maksimum umur koneksi ke PG (recycle)
client_login_timeout = 60        # Timeout saat klien login
query_timeout        = 0         # 0 = tidak ada batas (hindari nilai ini di prod)
query_wait_timeout   = 120       # Detik menunggu koneksi tersedia

# =============================================================================
# Autentikasi
# =============================================================================
auth_type  = scram-sha-256
auth_file  = /etc/pgbouncer/userlist.txt
# Atau gunakan HBA file:
# auth_hba_file = /etc/pgbouncer/pg_hba.conf

# =============================================================================
# Logging
# =============================================================================
logfile         = /var/log/pgbouncer/pgbouncer.log
pidfile         = /var/run/pgbouncer/pgbouncer.pid

log_connections = 0        # 1 = log setiap koneksi (verbose)
log_disconnections = 0     # 1 = log setiap disconnect
log_pooler_errors = 1      # Selalu log error pooler
stats_period    = 60       # Interval logging statistik (detik)

# =============================================================================
# Admin Interface
# =============================================================================
admin_users     = pgbouncer_admin
stats_users     = pgbouncer_stats, monitoring

# =============================================================================
# Performa
# =============================================================================
# Nonaktifkan TCP Nagle algorithm untuk latensi lebih rendah
tcp_keepalive   = 1
tcp_keepidle    = 60
tcp_keepintvl   = 10
tcp_keepcnt     = 6
tcp_socket_buffer = 0
so_reuseport    = 1        # Gunakan SO_REUSEPORT untuk performa SMP

# =============================================================================
# Server TLS
# =============================================================================
server_tls_sslmode  = require
server_tls_ca_file  = /etc/ssl/certs/ca.crt
client_tls_sslmode  = prefer
client_tls_ca_file  = /etc/ssl/certs/ca.crt

# =============================================================================
# userlist.txt format:
# "username" "md5_or_scram_password"
#
# Generate password hash:
# echo -n "passwordusername" | md5sum → tambahkan prefix "md5"
# Atau gunakan scram: psql -c "SELECT rolpassword FROM pg_authid WHERE rolname='user';"
#
# Contoh /etc/pgbouncer/userlist.txt:
# "app_user" "SCRAM-SHA-256$4096:..."
# "readonly_user" "SCRAM-SHA-256$4096:..."
# "pgbouncer_admin" "SCRAM-SHA-256$4096:..."
# =============================================================================

# =============================================================================
# Monitoring PgBouncer:
#   psql -h 127.0.0.1 -p 6432 -U pgbouncer_admin pgbouncer
#   SHOW POOLS;       -- Status semua pool
#   SHOW CLIENTS;     -- Koneksi klien aktif
#   SHOW SERVERS;     -- Koneksi ke PostgreSQL
#   SHOW STATS;       -- Statistik throughput
#   SHOW CONFIG;      -- Konfigurasi aktif
# =============================================================================
