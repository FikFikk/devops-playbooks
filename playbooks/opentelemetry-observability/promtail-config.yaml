server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape Docker container logs
  - job_name: containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/log/containers/*.log

    # Pipeline untuk parse JSON logs
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            timestamp: time
      
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      
      - labels:
          stream:
      
      - output:
          source: output
