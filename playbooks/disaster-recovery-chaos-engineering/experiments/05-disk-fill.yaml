# =============================================================================
# Eksperimen 05: Disk Fill
# Tujuan: Menguji respons sistem saat disk mendekati kapasitas penuh
# Hipotesis: Sistem memiliki alerting dan eviction policy yang tepat sehingga
#            tidak crash saat disk penuh, melainkan melakukan graceful handling
# =============================================================================

apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: disk-fill-experiment
  namespace: production
  labels:
    experiment-type: resilience
    severity: high
    gameday: "true"
spec:
  appinfo:
    appns: production
    applabel: "app=backend-api"
    appkind: deployment
  engineState: active
  chaosServiceAccount: litmus-admin
  experiments:
    - name: disk-fill
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: "120"
            # Persentase disk yang akan diisi
            - name: FILL_PERCENTAGE
              value: "85"
            # Ukuran data yang ditulis per detik
            - name: EPHEMERAL_STORAGE_MEBIBYTES
              value: "500"
            # Container runtime
            - name: CONTAINER_RUNTIME
              value: "containerd"
            - name: SOCKET_PATH
              value: "/run/containerd/containerd.sock"
            - name: PODS_AFFECTED_PERC
              value: "50"
        probe:
          - name: check-disk-pressure-alert
            type: promProbe
            promProbe/inputs:
              endpoint: "http://prometheus.monitoring.svc:9090"
              query: "kube_node_status_condition{condition='DiskPressure',status='true'}"
              comparator:
                type: float
                criteria: ">="
                value: "0"  # Verifikasi bahwa kubelet mendeteksi disk pressure
            mode: Edge
            runProperties:
              probeTimeout: 15s
              retry: 3
              interval: 20s
          - name: check-app-still-serving
            type: httpProbe
            httpProbe/inputs:
              url: "http://backend-api.production.svc:8080/health"
              insecureSkipVerify: false
              method:
                get:
                  criteria: "=="
                  responseCode: "200"
            mode: Continuous
            runProperties:
              probeTimeout: 10s
              retry: 5
              interval: 10s
