# =============================================================================
# Eksperimen 06: Availability Zone Failure Simulation
# Tujuan: Simulasikan kegagalan satu AZ dan pastikan aplikasi tetap berjalan
# Hipotesis: Dengan pod tersebar di multi-AZ dan PDB yang tepat, kehilangan
#            satu AZ tidak menyebabkan downtime
# =============================================================================

# Step 1: PodDisruptionBudget (pastikan sudah ter-deploy)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-api-pdb
  namespace: production
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: backend-api

---
# Step 2: Topology Spread Constraint (pastikan di deployment)
# Ini bukan chaos experiment, tapi prerequisite:
# spec:
#   template:
#     spec:
#       topologySpreadConstraints:
#         - maxSkew: 1
#           topologyKey: topology.kubernetes.io/zone
#           whenUnsatisfiable: DoNotSchedule
#           labelSelector:
#             matchLabels:
#               app: backend-api

---
# Step 3: AZ Failure Chaos Experiment
apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: az-failure-experiment
  namespace: production
  labels:
    experiment-type: resilience
    severity: critical
    gameday: "true"
spec:
  appinfo:
    appns: production
    applabel: "app=backend-api"
    appkind: deployment
  engineState: active
  chaosServiceAccount: litmus-admin
  experiments:
    - name: node-taint
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: "300"
            # Taint nodes di satu AZ untuk simulasi AZ failure
            - name: NODES_AFFECTED_PERC
              value: "100"
            # Label selector untuk memilih nodes di AZ tertentu
            - name: NODE_LABEL
              value: "topology.kubernetes.io/zone=ap-southeast-1a"
            # Taint yang diaplikasikan
            - name: TAINTS
              value: "az-failure=true:NoExecute"
        probe:
          - name: check-service-availability
            type: httpProbe
            httpProbe/inputs:
              url: "http://backend-api.production.svc:8080/health"
              insecureSkipVerify: false
              method:
                get:
                  criteria: "=="
                  responseCode: "200"
            mode: Continuous
            runProperties:
              probeTimeout: 15s
              retry: 5
              interval: 10s
              probePollingInterval: 5s
          - name: verify-multi-az-spread
            type: cmdProbe
            cmdProbe/inputs:
              command: "kubectl get pods -n production -l app=backend-api -o jsonpath='{range .items[*]}{.spec.nodeName}{\"\\n\"}{end}' | xargs -I{} kubectl get node {} -o jsonpath='{.metadata.labels.topology\\.kubernetes\\.io/zone}' | sort -u | wc -l"
              comparator:
                type: int
                criteria: ">="
                value: "2"  # Pod harus masih ada di minimal 2 AZ
              source: "litmus"
            mode: Edge
            runProperties:
              probeTimeout: 30s
              retry: 3
              interval: 30s
          - name: check-total-ready-pods
            type: cmdProbe
            cmdProbe/inputs:
              command: "kubectl get deployment backend-api -n production -o jsonpath='{.status.readyReplicas}'"
              comparator:
                type: int
                criteria: ">="
                value: "2"  # Minimal 2 pod harus tetap ready
              source: "litmus"
            mode: Continuous
            runProperties:
              probeTimeout: 15s
              retry: 3
              interval: 15s
