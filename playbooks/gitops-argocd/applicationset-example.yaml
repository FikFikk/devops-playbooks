apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: multi-cluster-apps
  namespace: argocd
spec:
  # Generator untuk multiple environments
  generators:
  - list:
      elements:
      - cluster: development
        url: https://kubernetes.default.svc
        namespace: dev
        replicas: "1"
        environment: dev
      - cluster: staging
        url: https://kubernetes.default.svc
        namespace: staging
        replicas: "2"
        environment: staging
      - cluster: production
        url: https://kubernetes.default.svc
        namespace: production
        replicas: "3"
        environment: prod
  
  # Template untuk setiap application
  template:
    metadata:
      name: 'myapp-{{cluster}}'
      labels:
        environment: '{{environment}}'
    spec:
      project: default
      
      source:
        repoURL: https://github.com/your-org/your-gitops-repo.git
        targetRevision: main
        path: 'apps/{{cluster}}'
        
        # Override values per environment
        helm:
          parameters:
          - name: replicaCount
            value: '{{replicas}}'
          - name: environment
            value: '{{environment}}'
      
      destination:
        server: '{{url}}'
        namespace: '{{namespace}}'
      
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
        - CreateNamespace=true
