apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
data:
  # RBAC Policy
  policy.csv: |
    # Format: p, subject, resource, action, object, effect
    
    # Role: readonly - hanya bisa view
    p, role:readonly, applications, get, */*, allow
    p, role:readonly, applications, list, */*, allow
    p, role:readonly, repositories, get, *, allow
    p, role:readonly, repositories, list, *, allow
    p, role:readonly, clusters, get, *, allow
    p, role:readonly, clusters, list, *, allow
    
    # Role: developer - bisa sync aplikasi tapi tidak modify config
    p, role:developer, applications, get, */*, allow
    p, role:developer, applications, list, */*, allow
    p, role:developer, applications, sync, */*, allow
    p, role:developer, applications, override, */*, allow
    p, role:developer, repositories, get, *, allow
    p, role:developer, repositories, list, *, allow
    p, role:developer, logs, get, */*, allow
    
    # Role: devops - full access kecuali RBAC settings
    p, role:devops, applications, *, */*, allow
    p, role:devops, repositories, *, *, allow
    p, role:devops, clusters, *, *, allow
    p, role:devops, projects, *, *, allow
    p, role:devops, logs, get, */*, allow
    p, role:devops, exec, create, */*, allow
    
    # Role: admin - full access
    p, role:admin, *, *, *, allow
    
    # Group assignments (gunakan SSO atau local users)
    # Format: g, user/group, role
    
    # Example dengan email
    g, developer@example.com, role:developer
    g, devops-team@example.com, role:devops
    g, admin@example.com, role:admin
    
    # Example dengan OIDC groups
    g, my-org:developers, role:developer
    g, my-org:devops, role:devops
    g, my-org:admins, role:admin
  
  # Default policy untuk user yang tidak match rules di atas
  policy.default: role:readonly
  
  # Scopes untuk RBAC
  scopes: '[groups, email]'
